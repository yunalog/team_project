<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>스튜디오 크루 RPG</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <section class="start-screen" id="startScreen" aria-label="게임 시작 화면">
      <div class="start-scene">
        <img src="Resource/Title/Title_Image.png" alt="스튜디오 크루 RPG" class="title-image" />
        <button id="startButton" class="start-button" type="button">게임 시작</button>
        <div class="audio-control start-audio-control" aria-label="타이틀 BGM 설정">
          <button id="titleMuteButton" class="mute-button" type="button" data-audio-mute>음소거</button>
          <label class="volume-control" for="titleVolumeSlider">
            <span>BGM</span>
            <input id="titleVolumeSlider" type="range" min="0" max="100" value="45" data-audio-volume />
            <strong id="titleVolumeValue" data-audio-value>45%</strong>
          </label>
        </div>
      </div>
    </section>

    <main class="game-shell is-hidden" id="gameShell">
      <header class="top-bar">
        <div>
          <p class="eyebrow">위치: 사무실 1층</p>
          <h1>스튜디오 크루 RPG</h1>
        </div>
        <div class="resource-row" aria-label="보유 자원">
          <span><b id="goldText">0</b> 자금</span>
          <span><b id="ideaText">0</b> 아이디어</span>
          <span><b id="stageText">1</b> 스테이지</span>
        </div>
        <div class="audio-control hud-audio-control" aria-label="게임 BGM 설정">
          <button id="hudMuteButton" class="mute-button" type="button" data-audio-mute>음소거</button>
          <label class="volume-control hud-volume-control" for="hudVolumeSlider">
            <span>BGM</span>
            <input id="hudVolumeSlider" type="range" min="0" max="100" value="45" data-audio-volume />
            <strong id="hudVolumeValue" data-audio-value>45%</strong>
          </label>
        </div>
        <button id="headerTitleButton" class="title-return-button" type="button">타이틀</button>
      </header>

      <section class="battlefield" id="battlefield" aria-label="전투 화면">
        <div class="office-backdrop">
          <span class="window"></span>
          <span class="desk desk-left"></span>
          <span class="desk desk-right"></span>
          <span class="plant"></span>
        </div>

        <div id="allyLayer" class="ally-layer" aria-label="아군 팀">
          <div class="ally" data-unit-id="player" style="--ally-x: 14%; --ally-y: 42px; --ally-color: #059669;">
            <span class="ally-sprite-sheet" role="img" aria-label="대표 개발자" style="--sprite-url: url('Anim/Player_1/Motion.png')"></span>
            <span class="ally-role">대표</span>
          </div>
        </div>
        <div id="effectLayer" class="effect-layer" aria-hidden="true"></div>

        <div id="enemyLayer" class="enemy-layer" aria-label="상대 프로젝트"></div>
      </section>

      <section class="message-line" aria-live="polite">
        <span id="battleLog">새 프로젝트가 도착했습니다.</span>
        <span id="dpsText" class="combat-power">초당 기여도 1</span>
        <button id="manualWorkButton" type="button">직접 처리</button>
      </section>

      <section class="panel-area">
        <article class="tab-panel is-active" data-panel="battle">
          <div class="stat-grid">
            <div>
              <span>팀 규모</span>
              <strong id="teamCountText">1명</strong>
            </div>
            <div>
              <span>클릭 기여도</span>
              <strong id="clickPowerText">1</strong>
            </div>
            <div>
              <span>처리한 업무</span>
              <strong id="clearCountText">0건</strong>
            </div>
          </div>
          <div class="action-row">
            <button id="upgradePlayerButton" type="button">대표 역량 강화</button>
            <button id="nextStageButton" type="button">다음 의뢰</button>
          </div>
        </article>

        <article class="tab-panel" data-panel="recruit">
          <div class="recruit-board">
            <section class="recruit-board__left">
              <h2 class="section-heading">영입</h2>
              <div class="shop-list" id="recruitList"></div>
            </section>
            <section class="recruit-board__right">
              <h2 class="section-heading">성장</h2>
              <div class="growth-grid">
                <div class="growth-card">
                  <span>작업처리능력</span>
                  <strong id="growthProcessValue">1</strong>
                  <small class="growth-subtext">기본 공격력</small>
                  <button class="growth-upgrade-button" type="button" data-upgrade-growth="process">강화</button>
                </div>
                <div class="growth-card">
                  <span>실수 감소</span>
                  <strong id="growthCriticalValue">0%</strong>
                  <small class="growth-subtext">치명타 확률</small>
                  <button class="growth-upgrade-button" type="button" data-upgrade-growth="critical">강화</button>
                </div>
                <div class="growth-card">
                  <span>새로운 아이디어</span>
                  <strong id="growthSkillValue">1</strong>
                  <small class="growth-subtext">스킬 피해량</small>
                  <button class="growth-upgrade-button" type="button" data-upgrade-growth="skill">강화</button>
                </div>
                <div class="growth-card">
                  <span>작업 속도</span>
                  <strong id="growthSpeedValue">1</strong>
                  <small class="growth-subtext">공격 속도</small>
                  <button class="growth-upgrade-button" type="button" data-upgrade-growth="speed">강화</button>
                </div>
                <div class="growth-card">
                  <span>야근 버티기</span>
                  <strong id="growthHpValue">100</strong>
                  <small class="growth-subtext">HP</small>
                  <button class="growth-upgrade-button" type="button" data-upgrade-growth="hp">강화</button>
                </div>
              </div>
              <p class="growth-note">영입한 직군과 대표 역량을 함께 성장시키면 전투력이 빨라집니다.</p>
            </section>
          </div>
        </article>

        <article class="tab-panel" data-panel="tools">
          <div class="shop-list" id="toolList"></div>
        </article>

        <article class="tab-panel" data-panel="timer">
          <div class="timer-board">
            <div>
              <span>오늘 업무 시간</span>
              <strong id="playTimeText">00:00</strong>
            </div>
            <div>
              <span>다음 자동 처리</span>
              <strong id="attackTimerText">1.0초</strong>
            </div>
          </div>
        </article>

        <article class="tab-panel" data-panel="settings">
          <div class="settings-row">
            <button id="saveButton" type="button">저장</button>
            <button id="resetButton" type="button">초기화</button>
            <button id="returnTitleButton" type="button">타이틀</button>
          </div>
          <div class="audio-control" aria-label="BGM 설정">
            <button id="muteButton" class="mute-button" type="button" data-audio-mute>음소거</button>
            <label class="volume-control" for="volumeSlider">
              <span>BGM</span>
              <input id="volumeSlider" type="range" min="0" max="100" value="45" data-audio-volume />
              <strong id="volumeValue" data-audio-value>45%</strong>
            </label>
          </div>
          <p class="save-state" id="saveStateText">자동 저장 준비 완료</p>
        </article>
      </section>

      <nav class="bottom-tabs" aria-label="게임 메뉴">
        <button class="tab-button is-active" type="button" data-tab="battle">전투</button>
        <button class="tab-button" type="button" data-tab="recruit">직군영입</button>
        <button class="tab-button" type="button" data-tab="tools">보조도구</button>
        <button class="tab-button" type="button" data-tab="timer">타이머</button>
        <button class="tab-button" type="button" data-tab="settings">설정</button>
      </nav>
    </main>

    <audio id="bgmAudio" src="Resource/Sound/BGM_Main_Theme.mp3" preload="auto" loop></audio>
    <script src="script.js"></script>
  </body>
</html>
